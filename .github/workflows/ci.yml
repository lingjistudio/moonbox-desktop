name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint / typecheck / build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download frpc sidecar
        run: pnpm sync:frpc

      - name: Frontend typecheck + build
        run: pnpm build

      - name: Rust typecheck
        working-directory: src-tauri
        run: cargo check

  icons:
    name: icon asset spec check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Pillow
        run: pip install --quiet Pillow
      - name: Run icon spec check
        run: |
          if [ -d docs/app-icons ]; then
            python scripts/check-icons.py --strict
          else
            echo "docs/app-icons 目录未变更，跳过"
          fi
