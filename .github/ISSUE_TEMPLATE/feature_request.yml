name: ✨ Feature Request
description: 提议新功能或改进（仅面向 MoonProxy 桌面客户端本身，不含 frp 上游特性）
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        提交前请先搜索已有 Issue / Discussions，避免重复。
        本仓库仅跟踪 MoonProxy 桌面客户端的代码与产品需求。
        通用部署 / 配置问题请去 [Discussions](https://github.com/MoonProxyHQ/moonproxy-desktop/discussions)。

  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题
      description: 一两句话讲清楚当前痛点。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你的建议方案
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 影响面
      options:
        - 仅 UI / 交互
        - 配置 / 存储
        - 调度 / 进程
        - 自更新 / 安装
        - 跨模块
    validations:
      required: true
